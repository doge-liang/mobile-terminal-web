<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Terminal</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="statusbar">
      <span id="status" class="off">连接中…</span>
      <span id="session-name"></span>
      <span class="spacer"></span>
      <button class="sbtn" id="btn-copy" title="复制选中文字（无选中则复制当前屏幕）">⎘</button>
      <button class="sbtn" id="btn-paste" title="把剪贴板文字粘贴到终端">⇥</button>
      <button class="sbtn" id="btn-clip" title="发送剪贴板中的图片">📋</button>
      <button class="sbtn" id="btn-img" title="发送相册图片到终端">📷</button>
      <input type="file" id="img-input" accept="image/*" multiple hidden>
      <button class="sbtn" id="btn-font-dec" title="缩小字体">A-</button>
      <button class="sbtn" id="btn-font-inc" title="放大字体">A+</button>
      <button class="sbtn" id="btn-bell" title="完成提示音">🔔</button>
      <button class="sbtn" id="btn-session" title="切换 tmux 会话">⇄</button>
    </div>
    <div id="term"></div>
    <div id="toolbar">
      <button data-seq="\x1b" class="key wide">Esc</button>
      <button id="key-ctrl" class="key mod">Ctrl</button>
      <button data-seq="\t" class="key">Tab</button>
      <button id="key-alt" class="key mod">Alt</button>
      <button data-seq="\x1b[A" class="key">↑</button>
      <button data-seq="\x1b[B" class="key">↓</button>
      <button data-seq="\x1b[D" class="key">←</button>
      <button data-seq="\x1b[C" class="key">→</button>
      <button data-seq="\x03" class="key danger">^C</button>
      <button data-seq="\x04" class="key">^D</button>
      <button data-seq="-" class="key">-</button>
      <button data-seq="/" class="key">/</button>
      <button data-seq="|" class="key">|</button>
      <button data-seq="~" class="key">~</button>
      <button data-seq="\x1b[5~" class="key wide">PgUp</button>
      <button data-seq="\x1b[6~" class="key wide">PgDn</button>
      <button data-seq="\x1b[H" class="key wide">Home</button>
      <button data-seq="\x1b[F" class="key wide">End</button>
    </div>
  </div>
  <div id="session-panel" hidden>
    <div class="sp-box">
      <div class="sp-head">
        <span>会话</span>
        <button id="sp-close" class="sp-x" title="关闭">✕</button>
      </div>
      <div class="sp-section">
        <div class="sp-label">服务器会话</div>
        <div id="sp-list"></div>
      </div>
      <div class="sp-section" hidden>
        <div class="sp-label">本标签最近</div>
        <div id="sp-mru"></div>
      </div>
      <div class="sp-section sp-newrow">
        <input id="sp-new" type="text" inputmode="text" autocomplete="off"
               placeholder="新建 / 切换到会话名…" maxlength="32">
        <button id="sp-create">进入</button>
      </div>
    </div>
  </div>
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/vendor/addon-web-links.js"></script>
  <script src="/vendor/addon-unicode11.js"></script>
  <script src="/app.js"></script>
</body>
</html>
