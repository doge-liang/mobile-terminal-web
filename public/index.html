<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Terminal</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="statusbar">
      <div id="sb-status">
        <span id="status" class="off">连接中…</span>
        <span id="session-name"></span>
        <span id="box-banner" hidden></span>
      </div>
      <div id="sb-actions">
      <button class="sbtn" id="btn-copy" title="复制选中文字（无选中则复制当前屏幕）"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
      <button class="sbtn" id="btn-paste" title="把剪贴板文字粘贴到终端"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 14h10M16 4h2a2 2 0 0 1 2 2v1.344M17 18l4-4l-4-4"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 1.793-1.113"/><rect width="8" height="4" x="8" y="2" rx="1"/></svg></button>
      <button class="sbtn" id="btn-clip" title="发送剪贴板中的图片"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg></button>
      <button class="sbtn" id="btn-img" title="发送相册图片到终端"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg></button>
      <input type="file" id="img-input" accept="image/*" multiple hidden>
      <button class="sbtn" id="btn-file" title="上传任意文件到终端"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg></button>
      <input type="file" id="file-input" multiple hidden>
      <button class="sbtn" id="btn-font-dec" title="缩小字体">A-</button>
      <button class="sbtn" id="btn-font-inc" title="放大字体">A+</button>
      <button class="sbtn" id="btn-bell" title="完成提示音"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.268 21a2 2 0 0 0 3.464 0m-10.47-5.674A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg></button>
      <button class="sbtn" id="btn-files" title="文件浏览器"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg></button>
      <button class="sbtn" id="btn-session" title="切换 tmux 会话"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3L4 7l4 4M4 7h16m-4 14l4-4l-4-4m4 4H4"/></svg></button>
      </div>
    </div>
    <div id="term"></div>
    <div id="hist-sheet" hidden>
      <div class="hs-head"><span>命令历史</span><span class="hs-hint">长按可固定 / 取消固定</span></div>
      <div id="hs-pinned"></div>
      <div id="hs-recent"></div>
    </div>
    <div id="composer" hidden>
      <button id="cp-hist" class="cbtn" title="历史与固定命令"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9a9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5m4-1v5l4 2"/></svg></button>
      <textarea id="cp-input" rows="1" enterkeyhint="send" autocapitalize="off"
                autocomplete="off" autocorrect="off" spellcheck="false"
                placeholder="输入命令，回车发送"></textarea>
      <button id="cp-send" class="cbtn accent" title="发送"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904zM6 12h16"/></svg></button>
    </div>
    <div id="toolbar">
      <button id="key-mode" class="key wide" title="切换输入模式"></button>
      <button data-seq="\x1b" class="key wide">Esc</button>
      <button id="key-ctrl" class="key mod">Ctrl</button>
      <button data-seq="\t" class="key">Tab</button>
      <button id="key-alt" class="key mod">Alt</button>
      <button data-seq="\x1b[A" class="key">↑</button>
      <button data-seq="\x1b[B" class="key">↓</button>
      <button data-seq="\x1b[D" class="key">←</button>
      <button data-seq="\x1b[C" class="key">→</button>
      <button data-seq="\x03" class="key danger">^C</button>
      <button data-seq="\x04" class="key">^D</button>
      <button data-seq="-" class="key">-</button>
      <button data-seq="/" class="key">/</button>
      <button data-seq="|" class="key">|</button>
      <button data-seq="~" class="key">~</button>
      <button data-seq="\x1b[5~" class="key wide">PgUp</button>
      <button data-seq="\x1b[6~" class="key wide">PgDn</button>
      <button data-seq="\x1b[H" class="key wide">Home</button>
      <button data-seq="\x1b[F" class="key wide">End</button>
    </div>
  </div>
  <div id="session-panel" hidden>
    <div class="sp-box">
      <div class="sp-head">
        <span>会话</span>
        <button id="sp-close" class="sp-x" title="关闭"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sp-section">
        <div class="sp-label">服务器会话</div>
        <div id="sp-list"></div>
      </div>
      <div class="sp-section" hidden>
        <div class="sp-label">本标签最近</div>
        <div id="sp-mru"></div>
      </div>
      <div class="sp-section sp-newrow">
        <input id="sp-new" type="text" inputmode="text" autocomplete="off"
               placeholder="新建 / 切换到会话名…" maxlength="32">
        <button id="sp-create">进入</button>
      </div>
    </div>
  </div>
  <div id="file-panel" hidden>
    <div class="sp-box">
      <div class="sp-head">
        <span id="fp-path" class="fp-path">~</span>
        <button id="fp-close" class="sp-x" title="关闭"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="sp-section sp-newrow">
        <button id="fp-up" title="上级目录"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 7-7 7 7m-7 7V5"/></svg>上级</button>
        <button id="fp-hidden" title="显示/隐藏以 . 开头的文件"></button>
        <button id="fp-upload"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m5-7-5-5-5 5m14 7v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>上传到此目录</button>
        <input type="file" id="fp-input" multiple hidden>
      </div>
      <div class="sp-section">
        <div id="fp-list"></div>
      </div>
    </div>
  </div>
  <div id="preview-panel" hidden>
    <div class="pv-box">
      <div class="pv-head">
        <span id="pv-title" class="pv-title"></span>
        <button id="pv-download" class="pv-btn" title="下载"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></button>
        <button id="pv-close" class="sp-x" title="关闭"><svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <div id="pv-body" class="pv-body"></div>
    </div>
  </div>
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/vendor/addon-web-links.js"></script>
  <script src="/vendor/addon-unicode11.js"></script>
  <script src="/app.js"></script>
</body>
</html>
